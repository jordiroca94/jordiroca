name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run TypeScript check
        run: pnpm run type-check
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run linter
        run: pnpm run lint
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable Corepack
        run: corepack enable
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm run test

  deploy:
    needs: [type-check, lint, test]
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  lighthouse:
    needs: deploy
    if: github.ref == 'refs/heads/main' && success()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Vercel deployment
        run: |
          echo "Waiting 30 seconds for Vercel deployment to be ready..."
          sleep 30

      - name: Run Lighthouse CI
        run: pnpm lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report-${{ github.sha }}
          path: .lighthouseci/
          retention-days: 30

      - name: Post commit comment with scores
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the manifest file
            const manifestPath = '.lighthouseci/manifest.json';
            if (!fs.existsSync(manifestPath)) {
              console.log('No manifest found, skipping comment');
              return;
            }
            
            const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            
            // Calculate average scores across all pages
            let totalPerf = 0, totalA11y = 0, totalBP = 0, totalSEO = 0;
            let count = 0;
            
            manifest.forEach(result => {
              const reportPath = result.jsonPath;
              if (fs.existsSync(reportPath)) {
                const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
                const categories = report.categories;
                
                totalPerf += categories.performance.score * 100;
                totalA11y += categories.accessibility.score * 100;
                totalBP += categories['best-practices'].score * 100;
                totalSEO += categories.seo.score * 100;
                count++;
              }
            });
            
            const avgPerf = Math.round(totalPerf / count);
            const avgA11y = Math.round(totalA11y / count);
            const avgBP = Math.round(totalBP / count);
            const avgSEO = Math.round(totalSEO / count);
            
            // Emoji indicators
            const getEmoji = (score) => score >= 90 ? '🟢' : score >= 50 ? '🟡' : '🔴';
            
            // Create comment body
            const commentBody = `## 🚀 Lighthouse CI Results
            
            📊 **Average Scores** (across ${count} audits):
            
            | Category | Score | Status |
            |----------|-------|--------|
            | Performance | ${avgPerf} | ${getEmoji(avgPerf)} |
            | Accessibility | ${avgA11y} | ${getEmoji(avgA11y)} |
            | Best Practices | ${avgBP} | ${getEmoji(avgBP)} |
            | SEO | ${avgSEO} | ${getEmoji(avgSEO)} |
            
            📄 **Full HTML Report**: [View Artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            🔗 **Commit**: \`${context.sha.substring(0, 7)}\`
            ⏰ **Run at**: ${new Date().toUTCString()}
            
            ---
            *Audited pages: /, /en, /en/projects, /en/volunteering, /es, /es/proyectos, /es/voluntariado, /de, /de/Projekte, /de/Freiwilligenarbeit*`;
            
            // Post comment on commit
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: commentBody
            });
